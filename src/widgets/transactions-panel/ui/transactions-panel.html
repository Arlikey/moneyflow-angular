<article class="panel transactions">
  <div class="panel__header">
    <div>
      <h2 class="panel__title">Recent Transactions</h2>
      <p class="panel__subtitle">
        {{ transactionService.currentMonthTransactions().length }} transactions this month
      </p>
    </div>
    <a [routerLink]="['/transactions']" class="panel__link">View all</a>
  </div>
  <app-transactions-table [transactions]="transactionService.recentTransactions()" />
</article>
