<aside class="sidebar">
  <nav class="nav">
    <div class="nav__label">overview</div>
    <ul class="nav__list">
      @for (item of navbarItems; track $index) {
        <li>
          <a [routerLink]="item.routerLink" routerLinkActive="active-link" class="nav__link">
            <svg class="nav__link-icon">
              <use [attr.href]="`sprite.svg#${item.icon}`"></use>
            </svg>
            <span>{{ item.title }}</span>
          </a>
        </li>
      }
    </ul>
  </nav>
</aside>
