<table class="table">
  <thead class="table__header">
    <tr class="table__row">
      @for (column of columns; track column.key) {
        <th
          class="table__row-header"
          [class.sorted]="sortColumn() === column.key"
          (click)="sortBy(column.key)"
        >
          {{ column.label }}
        </th>
      }
    </tr>
  </thead>
  <tbody class="table__body">
    @for (item of sortedTransactions(); track $index) {
      <tr class="table__row">
        <td class="table__row-data destination">{{ item.description }}</td>
        <td class="table__row-data">
          <span class="transaction__category">{{ item.categoryId }}</span>
        </td>
        <td class="table__row-data">{{ item.date | date: 'MMM d' }}</td>
        <td
          class="table__row-data amount"
          [class.expense]="item.type === 'expense'"
          [class.income]="item.type === 'income'"
        >
          {{ item.type === 'expense' ? '-' : '+' }}
          {{ item.amount | currency: item.currency }}
        </td>
      </tr>
    }
  </tbody>
</table>
